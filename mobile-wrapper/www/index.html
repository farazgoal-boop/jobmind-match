<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07070f" />
  <title>JobMind Match</title>
  <style>
    :root { --bg:#07070f; --card:#0e0e1c; --text:#eeeef8; --muted:#6666a0; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: system-ui, sans-serif;
      background: radial-gradient(ellipse at top, rgba(124,58,237,.18), transparent 55%), var(--bg);
      color: var(--text); display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      width: 100%; max-width: 420px; background: var(--card); border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px; padding: 28px 24px; text-align: center;
    }
    .logo { width: 72px; height: 72px; border-radius: 16px; margin: 0 auto 12px; display: block; }
    h1 { margin: 0 0 8px; font-size: 22px; }
    .badge {
      display: inline-block; margin-bottom: 14px; padding: 4px 10px; border-radius: 999px;
      background: rgba(37,211,102,.12); color: #25d366; font-size: 11px; border: 1px solid rgba(37,211,102,.25);
    }
    .sub { color: var(--muted); font-size: 13px; line-height: 1.55; margin-bottom: 18px; }
    .status {
      padding: 12px; border-radius: 10px; font-size: 13px; line-height: 1.5;
      background: rgba(124,58,237,.1); border: 1px solid rgba(124,58,237,.2); min-height: 44px;
    }
    .spin { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="icon-192.png" alt="JobMind" onerror="this.style.display='none'" />
    <span class="badge">v2.0 · Standalone · No PC</span>
    <h1>JobMind Match</h1>
    <p class="sub">Full app on your phone. Internet required. No PC pairing.</p>
    <div id="status" class="status"><span class="spin">⏳</span> Connecting to JobMind cloud…</div>
  </div>
  <script>
    const SERVERS = [
      'https://jobmind-match.onrender.com',
      'https://jobmind-match-production.onrender.com'
    ];
    const DASH_PATH = '/dashboard?mobile=1&active_mode=sell&panel=sell-hunter';
    let tries = 0;

    function setStatus(html) {
      document.getElementById('status').innerHTML = html;
    }

    async function tryServer(base) {
      const ctrl = new AbortController();
      const timer = setTimeout(function () { ctrl.abort(); }, 15000);
      try {
        const res = await fetch(base + '/api/license/status', { signal: ctrl.signal, cache: 'no-store' });
        clearTimeout(timer);
        return res.ok;
      } catch (e) {
        clearTimeout(timer);
        return false;
      }
    }

    async function boot() {
      tries += 1;
      for (let i = 0; i < SERVERS.length; i++) {
        const base = SERVERS[i];
        setStatus('<span class="spin">⏳</span> Connecting… (' + tries + ')');
        const ok = await tryServer(base);
        if (ok) {
          setStatus('✅ Connected! Opening Lead Hunter…');
          setTimeout(function () { window.location.href = base + DASH_PATH; }, 500);
          return;
        }
      }
      if (tries < 40) {
        setStatus('<span class="spin">⏳</span> Server waking up (Render free tier). Retrying…');
        setTimeout(boot, 3000);
      } else {
        setStatus('❌ Cannot reach JobMind cloud. Check mobile data/Wi‑Fi and try again.');
      }
    }

    boot();
  </script>
</body>
</html>
